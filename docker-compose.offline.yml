services:
  inventory-bot:
    image: ${IMAGE_NAME:-mineflayer-bot:1.0.0}
    container_name: mineflayer-inventory-bot
    restart: unless-stopped
    init: true
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - type: bind
        source: ./data
        target: /app/data
      - type: bind
        source: ./syncmatica
        target: /app/syncmatica
      - type: bind
        source: ./placements.json
        target: /app/placements.json
      - type: bind
        source: ./config.js
        target: /app/config.js
        read_only: true
